    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in

  - type: web
    name: workstream-employer
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter=@workstream/employer build
    startCommand: pnpm --filter=@workstream/employer start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in

  - type: web
    name: workstream-admin
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter=@workstream/admin build
    startCommand: pnpm --filter=@workstream/admin start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
