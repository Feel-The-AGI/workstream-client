services:
  - type: web
    name: workstream-student
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter=@workstream/student build
    startCommand: pnpm --filter=@workstream/student start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /onboarding

  - type: web
    name: workstream-university
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter=@workstream/university build
